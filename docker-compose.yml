# ===================================
# Binary-Brain | Docker Compose
# ===================================
services:
  # ── Desarrollo (hot-reload) ──
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: binary-brain-dev
    ports:
      - "3000:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

  # ── Producción (Nginx) ──
  prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: binary-brain-prod
    ports:
      - "3000:80"
    restart: unless-stopped
    profiles:
      - prod
